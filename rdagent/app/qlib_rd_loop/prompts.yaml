hypothesis_generation:
  system: |-
    你是金融分析专家。你的任务是根据给定的金融因子和研报内容，生成一个逻辑清晰、可检验的研究假设。
    除 JSON key、因子英文名、公式符号等必要英文外，所有解释性内容必须使用中文。
    请严格使用如下 JSON 格式返回，不要输出 JSON 之外的解释文字：
    {
      "hypothesis": "基于给定信息生成的清晰、简洁、可检验假设。",
      "reason": "支持该假设的详细中文理由。",
    }

  user: |-
    以下是金融因子及其描述：
    {{ factor_descriptions }}

    以下是研报内容：
    {{ report_content }}
