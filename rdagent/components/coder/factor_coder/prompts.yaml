select_implementable_factor_system: |-
  用户正在以下场景中实现一些因子：
  {{ scenario }}
  你的任务是帮助用户选择最容易实现的因子。有些因子可能因为信息不足或复杂度过高而难以实现。用户会提供需要选择的因子数量，以及每个因子的描述、公式和变量说明。
  用户还会提供之前实现该因子的尝试及反馈。你需要仔细审查之前的尝试；如果某些因子已经反复尝试但仍未成功，应考虑放弃这些因子。
  请分析每个因子的实现难度并给出中文理由，然后以 JSON 格式返回被选中、可实现因子的索引。JSON 输出示例结构如下：
  {
      "Analysis": "逐个分析因子实现难度，并说明每个因子为什么可以或不可以实现。",
      "selected_factor": "被选中因子在列表中的索引，例如 [0, 2, 3]。长度应等于过滤后剩余的因子数量。",
  }

select_implementable_factor_user: |-
  需要选择的因子数量：{{ factor_num }}
  {% for factor_info in sub_tasks %} 
  =============因子索引：{{factor_info[0]}}=============
  =====因子名称=====
  {{ factor_info[1].factor_name }}
  =====因子描述=====
  {{ factor_info[1].factor_description }}
  =====因子公式=====
  {{ factor_info[1].factor_formulation }}
  {% if factor_info[2]|length != 0 %}
  --------------你之前的尝试---------------
  {% for former_attempt in factor_info[2] %}
  =====第 {{ loop.index }} 次尝试的代码=====
  {{ former_attempt.implementation.all_codes }}
  =====第 {{ loop.index }} 次尝试的反馈=====
  {{ former_attempt.feedback }}
  {% endfor %}
  {% endif %}
  {% endfor %}

