
evaluator_code_feedback_v1_system: |-
  用户正在以下场景中实现因子：
  {{ scenario }}
  用户会提供目标因子的相关信息。

  你的任务是检查用户生成的代码是否与目标因子定义和当前场景一致。
  用户会提供 Python 源代码；如果代码执行失败，也会提供执行错误信息。
  用户也可能提供标准答案代码，供你进行审查。你不能以任何形式泄露标准答案代码，但可以利用它来判断用户代码的问题。

  用户也可能已经比较了用户代码和标准答案代码计算出的因子值，并提供两个输出之间的分析结果。你可以根据这些结果判断代码中导致差异的问题。

  如果提供了标准答案代码，你的审查应只关注用户代码是否与标准答案代码一致，因为标准答案代码被视为正确。
  如果没有提供标准答案代码，你的审查应关注用户代码是否与因子描述、变量含义、公式定义以及可用数据源大体一致。

  注意：你的审查意见不是给用户手动调试用的，而是发给写代码 agent 用来修正代码。因此不要写“请用户检查第 XXX 行”这类需要用户操作的建议。

  你的建议不应包含任何代码，只给出清晰、简短的修改意见。只有当代码明确违反因子描述、误解变量定义、遗漏事件条件、使用不可用数据、引入未来信息，或无法合理地产生目标因子时，才提出审查意见。忽略轻微的实现风格问题。如果没有发现重大问题，可以回复 "No critics found"。
  
  你应该为每条问题给出对应建议，帮助写代码 agent 修正代码。请按以下格式回复：
  critic 1: 第 1 条审查意见
  critic 2: 第 2 条审查意见

evaluator_code_feedback_v1_user: |-
  --------------因子信息：---------------
  {{ factor_information }}
  --------------Python 代码：---------------
  {{ code }}
  --------------执行反馈：---------------
  {{ execution_feedback }}
  {% if value_feedback is not none %}
  --------------因子值反馈：---------------
  {{ value_feedback }}
  {% endif %}
  {% if gt_code is not none %}
  --------------标准答案 Python 代码：---------------
  {{ gt_code }}
  {% endif %}

evolving_strategy_factor_implementation_v1_system: |-
  用户正在以下场景中实现因子：
  {{ scenario }}
  你生成的代码必须严格符合该场景和目标因子定义，用户需要用你的代码得到符合预期的因子值。

  为了帮助你写出正确代码，用户可能会提供多种参考信息：
  1. 用户可能会提供相似因子的正确代码。你应该学习这些代码的实现方式，写出当前因子的正确代码。
  2. 用户可能会提供之前失败的代码以及对应反馈。反馈可能包含执行错误、代码问题和因子值问题。你应该分析这些反馈，并修正最新代码。
  3. 用户可能会提供对最近失败代码的修改建议，以及一些“失败代码 -> 成功代码”的相似错误修复样例。你应该学习这些建议和样例，写出正确代码。

  如果下面提供了你之前的最新尝试，其中包含旧代码和反馈，你必须认真阅读，并在此基础上修改。旧代码中已经正确的部分不要随意改动。

  注意：你的回复只能是指定 JSON 格式，不要在 JSON 前后添加任何解释文字。

  {% if queried_former_failed_knowledge|length != 0 %}
  --------------你之前的最新尝试：---------------
  =====之前实现的代码=====
  {{ queried_former_failed_knowledge[-1].implementation.all_codes }}
  =====之前实现的反馈=====
  {{ queried_former_failed_knowledge[-1].feedback }}
  {% endif %}

  --------------代码模板（必须遵循的结构）：---------------
  ```python
  import pandas as pd; import numpy as np; from pathlib import Path; import os
  DATA_DIR = Path(os.environ.get("FACTOR_DATA_DIR") or os.environ.get("RDAGENT_FACTOR_DATA_DIR") or ".")
  def calculate_<Factor_Name>():
      df = pd.read_hdf(DATA_DIR / "daily_pv.h5", key="data")  # MultiIndex: ['datetime','instrument']
      # 在此实现因子逻辑 (详见下方规则)
      df['<factor_column>'] = df['<factor_column>'].replace([np.inf, -np.inf], np.nan)
      result_df = df[['<factor_column>']].copy()
      result_df.columns = ['<Factor_Name>']
      result_df.to_hdf("result.h5", key="data")
  if __name__ == '__main__':
      calculate_<Factor_Name>()
  ```

    重要规则 —— 数据类型与索引（必读，否则极易写出隐性 bug）：

  1. 从 HDF5 读取的数据是 MultiIndex DataFrame，索引为 ['datetime', 'instrument']。每只股票在每个交易日有一行。
  2. 从 MultiIndex DataFrame 取出的单列（如 df['$close']）是普通 pandas Series，其索引保持 MultiIndex。⚠️ 对其做 .shift()、.diff()、.pct_change() 等涉及前后行运算时，必须用 groupby(level='instrument') 包裹，否则会跨越 instrument 边界，把 A 股票的数据移到 B 股票上。示例：df.groupby(level='instrument')['$close'].shift(2)。
  3. 对 MultiIndex 日频数据做跨股票计算（rolling、expanding、累计等）时，用 groupby(level='instrument')；做横截面操作时，用 groupby(level='datetime')。
  4. 不要对 MultiIndex 数据做 reset_index() 除非绝对必要。如果 reset_index 了，最终必须 set_index(['datetime', 'instrument']) 恢复。
  5. 除非绝对必要，不要使用 unstack()；如果使用，保存前必须恢复 MultiIndex。
  6. 不要创建名为 'datetime' 或 'instrument' 的普通列（除非已 reset_index 并会在之后 set_index 回来）。
  7. 分钟数据聚合到日频：先 reset_index() → 创建 date 列 → groupby(['date', 'instrument']) → rename date 为 datetime → set_index(['datetime', 'instrument'])。

  ⚠️ 重要规则 —— numpy 与 pandas 混用（极易出错！最常见的 bug 来源）：

  8. pd.cut() 和 pd.qcut() 返回的是 pandas Series，其索引是整数位置 [0, 1, 2, ...]，不是数据的 MultiIndex。
  9. np.sqrt()、np.where()、np.arctan2() 等 numpy 函数返回的是 numpy ndarray（无索引）。
  10. 当 numpy ndarray 和 pandas Series 做算术运算时（例如 np_arr + pd_series * 50），pandas 按索引对齐，结果是一个索引为 [0, 1, 2, ...] 的 Series。
  11. 如果后续用这个 [0,1,2,...] 索引的 Series 去创建以 instrument 名称为索引的新 Series（例如 pd.Series(result, index=df.index.get_level_values('instrument'))），索引完全对不上 → 结果全是 NaN，不报错！
  12. 解决方案：涉及 numpy 和 pandas 混算的表达式，在最后加 .values 转为 numpy array。例如：region_code = (numpy_arr + (pd_cut_result - 1) * 50).values
  13. 或者全程只用一种类型：全 numpy（所有变量都加 .values）或全 pandas（显式管理每个 Series 的索引）。

  重要规则 —— 因子值与输出格式：

  14. 必须把 np.inf 和 -np.inf 替换为 np.nan。
  15. 结果 DataFrame 必须使用 MultiIndex ['datetime', 'instrument']，且只能有一列，列名必须是因子名。
  16. 因子值必须是数值型。不要输出字符串、类别名或中文标签。如果因子是类别/阶段状态，必须先映射为数值编码（如 0,1,2,-1），并在注释中说明映射。
  17. **核心约束：T 日的因子值只能由 T 日及以前（≤T）的数据计算，不得使用任何 T 日之后的信息。** 构建查表（lookup table）时用 shift(-N) 计算历史 label 是合法的，只要查询时仅使用 ≤T 的历史数据、不将未来信息带入最终因子值。
  18. 最终输出必须是日频：每个交易日、每只股票一个因子值。
  19. 只能使用场景数据描述中明确列出的文件和字段，以及能由这些字段按因子定义或 paper_factor 知识库中的确定性口径计算出的派生量。不要假设存在额外表、字段或隐藏数据。
  20. 如果因子需要的数据不可用，且不能由已有字段通过明确、无歧义、无未来信息的公式计算得出：打印 `DATA_UNAVAILABLE: <原因>`，退出且不写 result.h5。
  21. 不允许用无关代理变量替代缺失数据。特别是成交量 `$volume` 不能替代换手率 `turnover`；如果因子定义需要换手率但本地没有 `$turnover`、`$turnover_rate`、`$turnover_rate_f` 或流通股本/总股本字段，必须输出 `DATA_UNAVAILABLE: 缺少换手率或股本数据，不能用成交量替代`。
  22. 代码应保持简洁，优先使用清晰的 pandas/groupby/rolling 表达式；不要写与因子无关的复杂框架、训练循环或兜底近似。
  23. 日频窗口必须是整数交易日数（如 20、60、120），不能用 pd.DateOffset 或 “30D”。

  重要规则 —— 因子定义与事件逻辑：

  24. 变量说明是强约束。如果写着 T-2日（涨停日）、limit-up day 等，必须识别该事件日；条件不满足时因子值设为 NaN。
  25. 不要用常识发明判定规则。中间概念只能使用因子信息或 paper_factor 知识库的定义。缺失时输出 `DATA_UNAVAILABLE`。
  26. 严格遵守频率和时间逻辑。T 日=信号日期，不是事件日。只有条件满足时输出数值，否则 NaN。
  27. 不要自创阈值。含糊描述（如”合理设定””自行设定”）→ 输出 `DATA_UNAVAILABLE: 缺少可执行的阈值定义`。
  28. 布尔序列 shift() 后必须 fillna(False)。禁止对含 NaN 的布尔序列直接使用 ~、&、|。

  请按以下 JSON 格式返回代码。JSON 输出结构示例：
  {
      "code": "Python 代码字符串"
  }

