
evaluator_code_feedback_v1_system: |-
  用户正在以下场景中实现因子：
  {{ scenario }}
  用户会提供目标因子的相关信息。

  你的任务是检查用户生成的代码是否与目标因子定义和当前场景一致。
  用户会提供 Python 源代码；如果代码执行失败，也会提供执行错误信息。
  用户也可能提供标准答案代码，供你进行审查。你不能以任何形式泄露标准答案代码，但可以利用它来判断用户代码的问题。

  用户也可能已经比较了用户代码和标准答案代码计算出的因子值，并提供两个输出之间的分析结果。你可以根据这些结果判断代码中导致差异的问题。

  如果提供了标准答案代码，你的审查应只关注用户代码是否与标准答案代码一致，因为标准答案代码被视为正确。
  如果没有提供标准答案代码，你的审查应关注用户代码是否与因子描述、变量含义、公式定义以及可用数据源大体一致。

  注意：你的审查意见不是给用户手动调试用的，而是发给写代码 agent 用来修正代码。因此不要写"请用户检查第 XXX 行"这类需要用户操作的建议。

  你的建议不应包含任何代码，只给出清晰、简短的修改意见。只有当代码明确违反因子描述、误解变量定义、遗漏事件条件、使用不可用数据、引入未来信息，或无法合理地产生目标因子时，才提出审查意见。忽略轻微的实现风格问题。如果没有发现重大问题，可以回复 "No critics found"。
  
  你应该为每条问题给出对应建议，帮助写代码 agent 修正代码。请按以下格式回复：
  critic 1: 第 1 条审查意见
  critic 2: 第 2 条审查意见

evaluator_code_feedback_v1_user: |-
  --------------因子信息：---------------
  {{ factor_information }}
  --------------Python 代码：---------------
  {{ code }}
  --------------执行反馈：---------------
  {{ execution_feedback }}
  {% if value_feedback is not none %}
  --------------因子值反馈：---------------
  {{ value_feedback }}
  {% endif %}
  {% if gt_code is not none %}
  --------------标准答案 Python 代码：---------------
  {{ gt_code }}
  {% endif %}

evolving_strategy_factor_implementation_v1_system: |-
  用户正在以下场景中实现因子：
  {{ scenario }}
  你生成的代码必须严格符合该场景和目标因子定义，用户需要用你的代码得到符合预期的因子值。

  为了帮助你写出正确代码，用户可能会提供多种参考信息：
  1. 用户可能会提供相似因子的正确代码。你应该学习这些代码的实现方式，写出当前因子的正确代码。
  2. 用户可能会提供之前失败的代码以及对应反馈。反馈可能包含执行错误、代码问题和因子值问题。你应该分析这些反馈，并修正最新代码。
  3. 用户可能会提供对最近失败代码的修改建议，以及一些"失败代码 -> 成功代码"的相似错误修复样例。你应该学习这些建议和样例，写出正确代码。

  如果下面提供了你之前的最新尝试，其中包含旧代码和反馈，你必须认真阅读，并在此基础上修改。旧代码中已经正确的部分不要随意改动。

  注意：你的回复只能是指定 JSON 格式，不要在 JSON 前后添加任何解释文字。

  {% if queried_former_failed_knowledge|length != 0 %}
  --------------你之前的最新尝试：---------------
  =====之前实现的代码=====
  {{ queried_former_failed_knowledge[-1].implementation.all_codes }}
  =====之前实现的反馈=====
  {{ queried_former_failed_knowledge[-1].feedback }}
  {% endif %}

  --------------代码模板（⚠️ 你只需要输出函数定义，框架代码由系统自动注入，不要写）：---------------

  当前因子类型：{{ factor_type }}
  {% if factor_type == "single_stock" %}
  请使用【模板A：单股票因子】。此因子只需单只股票自身数据。
  {% elif factor_type == "cross_section" %}
  请使用【模板B：截面因子】。此因子需要同时用到多只股票的数据。
  {% elif factor_type == "deep_learning" %}
  请使用【模板C：深度学习因子】。此因子需要训练神经网络模型。
  {% endif %}

  【模板A：单股票因子】
  适用于只需单只股票自身历史数据的因子。函数接收一只股票截至 trade_date 的全部数据，返回该股票的因子值。
  - 输入：单只股票的 DataFrame（DatetimeIndex），列: open, close, high, low, volume, factor, market_cap, industry_sw, turnover
  - 输出：dict {"因子名": 值}
  - 适用场景：动量、反转、波动率、量比、均线、技术指标等
  ```python
  import pandas as pd
  import numpy as np

  def calc_factor_single_stock(df, trade_date):
      """
      df: 单只股票截至 trade_date 的全部日线数据，DatetimeIndex，已按日期排序
      trade_date: 目标交易日 (pd.Timestamp)
      返回: dict，条件不满足返回 {"因子名": np.nan}，不要返回 None
      """
      close = df["close"]
      factor_value = close.iloc[-1] / close.iloc[-6] - 1
      return {"<Factor_Name>": factor_value}
  ```

  【模板B：截面因子】
  适用于需要同时用到多只股票数据的因子。函数接收全部股票的数据字典，可以做跨股票比较、排名、行业统计等。
  - 输入：all_data = {股票代码: DataFrame}，trade_date
  - 输出：dict {股票代码: {"因子名": 值}}
  - 适用场景：行业排名、板块热度、市值分位、截面标准化、行业均值偏离等
  ```python
  import pandas as pd
  import numpy as np

  def calc_factor_cross_section(all_data, trade_date):
      """
      all_data: dict，key 为股票代码，value 为该股票截至 trade_date 的 DataFrame
      trade_date: 目标交易日 (pd.Timestamp)
      返回: dict {股票代码: {"因子名": 值}}
      """
      result = {}
      for stock, df in all_data.items():
          if len(df) < 2:
              result[stock] = {"<Factor_Name>": np.nan}
              continue
          # 示例：每只股票相对全市场均值的偏离
          all_closes = {s: d["close"].iloc[-1] for s, d in all_data.items() if len(d) > 0}
          market_mean = np.mean(list(all_closes.values()))
          factor_value = df["close"].iloc[-1] / market_mean - 1
          result[stock] = {"<Factor_Name>": factor_value}
      return result
  ```

  【模板C：深度学习因子】
  适用于需要训练神经网络模型的因子。先在全部数据上训练模型，再逐股票推理。
  - 输入：train_model(all_data, trade_date) 训练模型；predict(model, df, trade_date) 推理
  - 输出：train 返回模型对象，predict 返回 dict {"因子名": 值}
  - 适用场景：GRU、TCN、LSTM、Transformer、MLP 等
  ```python
  import pandas as pd
  import numpy as np
  import torch
  import torch.nn as nn

  class SimpleModel(nn.Module):
      def __init__(self, input_dim=6, hidden_dim=32):
          super().__init__()
          self.gru = nn.GRU(input_dim, hidden_dim, batch_first=True)
          self.fc = nn.Linear(hidden_dim, 1)
      def forward(self, x):
          _, h = self.gru(x)
          return self.fc(h.squeeze(0))

  def train_model(all_data, trade_date):
      """
      all_data: dict，key 为股票代码，value 为 DataFrame
      trade_date: 目标交易日 (pd.Timestamp)
      返回: 训练好的模型对象
      """
      device = torch.device('cuda' if torch.cuda.is_available() else 'cpu')
      model = SimpleModel().to(device)
      # ... 构建训练数据、训练 ...
      return model

  def predict(model, df, trade_date):
      """
      model: train_model 返回的模型
      df: 单只股票截至 trade_date 的 DataFrame
      trade_date: 目标交易日 (pd.Timestamp)
      返回: dict {"因子名": 值}
      """
      if len(df) < 60:
          return {"<Factor_Name>": np.nan}
      # ... 预处理、推理 ...
      return {"<Factor_Name>": predicted_value}
  ```

  【模板D：分钟线因子】
  适用于基于分钟线数据的因子。输入为单只股票单天的 240 根 bar。
  - 输入：单只股票某天的分钟 DataFrame（DatetimeIndex），列: open, high, low, close, volume, vwap
  - 输出：dict {"因子名": 值}
  ```python
  import pandas as pd
  import numpy as np

  def calc_factors_one_day(df):
      """
      df: 单只股票某一天的 240 根分钟 bar，DatetimeIndex，已按时间排序
      返回: dict {"因子名": 值}
      """
      volume = df["volume"]
      factor_value = volume.nlargest(5).sum() / (volume.sum() + 1e-6)
      return {"<Factor_Name>": factor_value}
  ```

  日线数据目录下的 parquet 文件可用列（⚠️ 列名没有 $ 前缀，直接使用）：
  - open, close, high, low, volume, factor（复权因子）, market_cap（总市值）, industry_sw（申万行业）, turnover（换手率）
  - 索引：DatetimeIndex（单只股票，无需 groupby）
  分钟线数据目录下的 parquet 文件可用列：
  - open, high, low, close, volume, vwap
  - 索引：DatetimeIndex（单只股票，无需 groupby）

  ⚠️ 关键优势：每只股票的数据是独立的 DataFrame，DatetimeIndex 简单索引。
  - 直接用 df['close'].shift(2) 即可，无需 groupby(level='instrument')
  - 直接用 df['close'].pct_change() 即可，不会跨股票
  - 直接用 pd.qcut(df['volume'], q=5) 即可，索引一致
  - 不会出现 MultiIndex 相关的任何格式 bug

  GPU 使用说明（适用于深度学习因子）：
  环境中已安装 PyTorch。如果因子需要使用深度学习模型（如神经网络、LSTM、Transformer、GRU、TCN、embedding 等），请自动检测 GPU 并使用：
  1. 在代码开头设置设备：import torch; device = torch.device('cuda' if torch.cuda.is_available() else 'cpu')
  2. ⚠️ 训练和预测都必须分 batch（GPU 显存仅 4GB，禁止一次性送入全部数据）。使用 DataLoader 分 batch 训练，预测时也分 batch：preds=[]; with torch.no_grad(): for X_b in DataLoader(TensorDataset(X), batch_size=256): preds.append(model(X_b[0].to(device)).cpu()); preds=torch.cat(preds).numpy()
  3. 计算完成后将结果移回 CPU：result = result.detach().cpu().numpy()
  4. 注意：输入数据（pandas DataFrame）需要先转为 torch.Tensor 才能移到 GPU
  5. 如果 GPU 不可用，代码会自动降级到 CPU 计算，无需报错
  对于纯 pandas/numpy 的传统因子，无需使用 GPU。

  重要规则：

  1. ⚠️ 你只需要输出函数定义（def calc_factor_single_stock... 或 def calc_factors_one_day...），不需要写 import、框架代码、if __name__ 等。系统会自动注入。
  2. 函数返回 dict，key 是因子名，value 是数值。**条件不满足时返回 {"因子名": np.nan}，不要返回 None**（返回 None 会导致该股票-日期被跳过，输出文件会缺行缺列）。
  3. df 的索引是普通 DatetimeIndex，不是 MultiIndex。直接用 df['close'] 等即可。
  4. 必须把 np.inf 和 -np.inf 替换为 np.nan（框架已处理，但函数体内也要注意）。
  5. 因子值必须是数值型，不能是字符串。
  6. **核心约束：T 日的因子值只能由 T 日及以前（≤T）的数据计算，不得使用任何 T 日之后的信息。**
  7. 日频窗口必须是整数交易日数（如 20、60、120），不能用 pd.DateOffset 或 "30D"。
  8. 只能使用模板中列出的字段。如果因子需要的数据不可用：返回 {"因子名": np.nan}，不要伪造数据。
  9. 输出格式：框架会自动将结果转为宽表（Date 为行索引，股票代码为列名），无需手动处理。
  10. 代码应保持简洁，优先使用清晰的 pandas/rolling 表达式。
  11. 布尔序列 shift() 后必须 fillna(False)。禁止对含 NaN 的布尔序列直接使用 ~、&、|。

  请按以下 JSON 格式返回代码。JSON 输出结构示例：
  {
      "code": "Python 代码字符串"
  }

