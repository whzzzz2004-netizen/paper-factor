extract_factor_formulation_system: |-
    我有一篇金融工程研报，以及从中抽取出的因子列表。这些因子应是论文新提出的因子，而不是基准对比因子。请根据研报和给定因子列表补全具体信息，任务如下：

    1. 为每个因子抽取 LaTeX 格式的计算公式。公式中的变量名不能包含空格，应使用下划线连接；公式中的因子名必须与我提供的因子名一致。
    2. 为每个公式中的变量和函数提供中文解释。解释必须保留研报中的完整含义，包括时间偏移、事件锚点、样本过滤条件和条件事件日。变量名和函数名必须与公式中一致。
    3. 括号中的短语也属于变量定义的一部分。例如变量被描述为 "T-2 day (limit-up day) volume" 时，T-2 必须是涨停事件日，而不是普通的 T-2 日成交量。
    4. 如果研报在事件样本上定义因子，请把事件条件或 indicator 写入公式，确保后续代码复现时不会丢失该条件。
    5. 每个因子在时间、样本过滤和所需输入上都必须自包含。不要把 Stage_t_raw、Stage_smooth、PullbackDay、FirstBoardDay、market sentiment 等未定义中间概念当作已有字段。如果研报定义了这些概念，请保留定义；如果研报没有定义，请明确标记缺少定义，不要在公式抽取阶段发明新规则。
    6. 禁止在 formulation 或 variables 中使用”同 XXX””同上””其他参数同””具体架构见研报””参考前文””见表 X/图 X”等引用式描述。后续代码生成只依赖当前 JSON，不会再读取研报或其他因子，因此所有共享设定都必须在当前因子内完整展开；无法展开时明确标记缺少哪些架构、参数、标签或数据定义。
    7. 对机器学习/深度学习因子，必须在当前因子中完整说明模型结构和训练目标，包括输入字段、输入窗口、预测 horizon、标签定义、样本构造、标准化/去极值方式、模型类型、层数、隐藏维度、loss、训练/验证切分、随机种子或复现实验需要的固定参数。不能只写”同某模型””newloss””seed3”或”具体见研报”。
    8. 每个因子必须提取 special_conditions，包括研报中对该因子的所有数据过滤/剔除条件（剔除停牌、剔除ST、剔除上市不满N天、剔除涨跌停日、剔除特殊板块等）。无特殊条件则写”无”。

    本地复现可使用以下数据源（按股票分割的 parquet 文件，列名无 $ 前缀）：

    1. 日频价量数据：open、close、high、low、volume、factor（复权因子）、pct_chg（涨跌幅）、pre_close（前收盘价）、turnover_rate（换手率）、jhjj_hsl（集合竞价换手率）。
    2. 日频基本面因子（共14个，英文列名）：roe（净资产收益率）、roa（总资产收益率）、pe_ttm（市盈率TTM）、pb（市净率）、revenue_yoy（营收同比增速）、profit_yoy（净利润同比增速）、gross_margin（毛利率）、net_margin（净利率）、debt_to_asset（资产负债率）、ocf_per_share（每股经营现金流）、market_cap（总市值/亿元）、circulating_market_cap（流通市值/亿元）、total_shares（总股本/万股）、float_shares（流通股本/万股）。
    3. 分钟线数据：open、close、high、low、volume、vwap、factor（复权因子）、return（分钟收益率）。

    请只使用可用的日频/分钟价量数据展开公式。如果某个因子需要不可用数据或未定义中间概念，请保留论文公式，但在变量解释中明确标记所需变量不可用，并说明该因子应跳过，而不是用无关的价量代理变量近似。若因子数量超过 token 限制，在不超过限制的前提下尽可能多抽取公式。注意避免 JSON 中的特殊字符语法错误，尤其是 LaTeX 中的反斜杠和下划线。

    请用 JSON 格式给出分析，schema 如下：
    {
        "factor name 1": {
            "formulation": "因子 1 的 LaTeX 公式",
            "variables": {
                "变量或函数名 1": "变量或函数 1 的中文说明",
                "变量或函数名 2": "变量或函数 2 的中文说明"
            },
            "special_conditions": "剔除停牌日、剔除ST股等过滤条件，无则写'无'"
        },
        "factor name 2": {
            "formulation": "因子 2 的 LaTeX 公式",
            "variables": {
                "变量或函数名 1": "变量或函数 1 的中文说明",
                "变量或函数名 2": "变量或函数 2 的中文说明"
            },
            "special_conditions": "剔除上市不满60个交易日的次新股"
        }
    }


