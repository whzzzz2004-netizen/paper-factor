name: Build and Publish Docker Image

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:

env:
  IMAGE_NAME: local_factor_exec
  DOCKERFILE_DIR: rdagent/components/coder/factor_coder/docker

jobs:
  build-and-publish:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      packages: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Extract metadata
        id: meta
        run: |
          echo "version=${GITHUB_REF#refs/tags/}" >> $GITHUB_OUTPUT
          REPO_LOWER=$(echo "${{ github.repository }}" | tr '[:upper:]' '[:lower:]')
          echo "ghcr_image=ghcr.io/${REPO_LOWER}/${IMAGE_NAME}" >> $GITHUB_OUTPUT

      - name: Login to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push to ghcr.io
        uses: docker/build-push-action@v5
        with:
          context: ${{ env.DOCKERFILE_DIR }}
          push: true
          tags: |
            ${{ steps.meta.outputs.ghcr_image }}:latest
            ${{ steps.meta.outputs.ghcr_image }}:${{ steps.meta.outputs.version }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Export image to tar.gz
        run: |
          docker pull ${{ steps.meta.outputs.ghcr_image }}:latest
          docker save ${{ steps.meta.outputs.ghcr_image }}:latest | gzip > ${IMAGE_NAME}_latest.tar.gz

      - name: Upload to GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          name: "Release ${{ steps.meta.outputs.version }}"
          files: ${IMAGE_NAME}_latest.tar.gz
          generate_release_notes: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Login to Alibaba Cloud ACR
        if: ${{ secrets.ALIYUN_ACR_USERNAME != '' }}
        uses: docker/login-action@v3
        with:
          registry: registry.cn-hangzhou.aliyuncs.com
          username: ${{ secrets.ALIYUN_ACR_USERNAME }}
          password: ${{ secrets.ALIYUN_ACR_PASSWORD }}

      - name: Push to Alibaba Cloud ACR
        if: ${{ secrets.ALIYUN_ACR_USERNAME != '' }}
        env:
          ACR_NAMESPACE: ${{ secrets.ALIYUN_ACR_NAMESPACE }}
        run: |
          NAMESPACE="${ACR_NAMESPACE:-${{ github.repository_owner }}}"
          ACR_IMAGE="registry.cn-hangzhou.aliyuncs.com/${NAMESPACE}/${IMAGE_NAME}"
          docker tag ${{ steps.meta.outputs.ghcr_image }}:latest ${ACR_IMAGE}:latest
          docker tag ${{ steps.meta.outputs.ghcr_image }}:latest ${ACR_IMAGE}:${{ steps.meta.outputs.version }}
          docker push ${ACR_IMAGE}:latest
          docker push ${ACR_IMAGE}:${{ steps.meta.outputs.version }}
